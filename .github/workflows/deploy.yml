name: Vercel Develop Deployment

# develop 브랜치에 코드가 push(또는 Merge) 될 때만 실행
on:
  push:
    branches:
      - develop

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  Deploy-to-Vercel:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 코드 가져오기
        uses: actions/checkout@v3

      - name: 2. Vercel 도구 설치하기
        run: npm install --global vercel@latest

      - name: 3. Vercel 프로젝트 기본 설정 가져오기
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 3-1. Vite용 환경 변수(.env.production) 생성하기
        run: vercel env pull .env.production --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 3-2. (디버깅) Vercel이 변수를 줬는지 확인!
        run: |
          echo "다운로드된 환경 변수 목록 (보안을 위해 값은 가렸습니다):"
          if [ -s .env.production ]; then
            cat .env.production | sed 's/=.*/=***_숨김_***/'
          else
            echo "❌ 파일이 텅 비었습니다!! Vercel 대시보드 설정을 다시 확인해야 합니다."
          fi

      - name: 4. 프로젝트 빌드하기
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 5. Vercel에 배포하기
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
